<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Weight Calc</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin-top: 70px;
            background: #333;
            color: #fff;
        }

        .card {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="display-5 text-center mb-4">Weight Converter</h1>

            <input 
                id="amtInput"
                type="number"
                class="form-control form-control-lg mb-4"
                placeholder="Enter Amount..."
            >

            <div id="output">

                <!-- Grams -->
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h4>Grams</h4>
                        <div id="gramsOutput"></div>
                    </div>
                </div>

                <!-- Kilograms -->
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h4>Kilograms</h4>
                        <div id="kgOutput"></div>
                    </div>
                </div>

                <!-- Ounces -->
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <h4>Ounces</h4>
                        <div id="ozOutput"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
